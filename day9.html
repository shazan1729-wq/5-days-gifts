<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Locked Surprise 💌</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      overflow:hidden;
      font-family:'Poppins',sans-serif;

       background:linear-gradient(135deg, #f0db1b 10%, #42ffe0 30%, #fe2273 70%, #08d3ea 100%);

      background-size:400% 400%;
      animation:bgMove 12s ease infinite;

      color:white;
      text-align:center;
    }

    @keyframes bgMove{

      0%{
        background-position:0% 50%;
      }

      50%{
        background-position:100% 50%;
      }

      100%{
        background-position:0% 50%;
      }
    }

    h1{
      font-size:3rem;
      margin-bottom:15px;

      text-shadow:
      0 0 10px rgba(255,255,255,0.8),
      0 0 20px rgba(255,255,255,0.5);
    }

    p{
      font-size:1.2rem;
      width:85%;
      max-width:700px;
      line-height:1.8;
      opacity:0.95;
    }

    .openBtn{

      margin-top:35px;

      padding:18px 42px;

      border:none;

      border-radius:50px;

      font-size:1.2rem;

      font-weight:bold;

      cursor:pointer;

      color:white;

      background:linear-gradient(
        90deg,
        #ff4d6d,
        #6a5acd
      );

      box-shadow:
      0 10px 25px rgba(0,0,0,0.25);

      transition:0.3s;
    }

    .openBtn:hover{

      transform:scale(1.08);
    }

    .heart{

      position:absolute;

      font-size:22px;

      animation:floatUp linear infinite;

      opacity:0.8;
    }

    @keyframes floatUp{

      0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:0;
      }

      20%{
        opacity:1;
      }

      100%{
        transform:translateY(-120px) rotate(360deg);
        opacity:0;
      }
    }

    #message{
      margin-top:18px;
      font-size:1rem;
      color:#fff5f5;
    }

  </style>
</head>

<body>

   <h1>✨ A Special Surprise Awaits ✨</h1>

  <p>
    Some pages are not just webpages...
    they are memories, emotions,
    efforts and feelings wrapped together 💖
    <br><br>
    Click below when you're ready
    to open the special Celebration 🌸
  </p>

  <button class="openBtn" onclick="openPage()">

    Open Grand Celebration ! 💌

  </button>

  <div id="message"></div>

<script>

//
// DATE LOCK
//

const unlockDate =
new Date("2026-05-29T00:00:00");

function openPage(){

  const today = new Date();

  if(today < unlockDate){

    document.getElementById("message")
    .innerHTML =
    "⏳ This page is locked until 29 May 2026 <br><br>With for it, this surprise will be worth the wait! 🧡";

    return;
  }

  //
  // OPEN DAY9 PAGE
  //

  window.location.href = "day6.html";
}

//
// FLOATING HEARTS
//

const emojis = [
  "💖",
  "✨",
  "💌",
  "🧡",
  "🌸",
  "🥳"
];

function createHearts(){

  const heart =
  document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML =
  emojis[Math.floor(
    Math.random() * emojis.length
  )];

  heart.style.left =
  Math.random() * 100 + "vw";

  heart.style.animationDuration =
  (4 + Math.random() * 6) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {

    heart.remove();

  },10000);
}

setInterval(createHearts,300);

</script>

</body>
</html>
