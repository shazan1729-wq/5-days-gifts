<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 4 | Fun Quiz About Us 🎮</title>
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background:linear-gradient(135deg, #f0db1b 10%, #42ffe0 30%, #fe2273 70%, #08d3ea 100%);
    background-size: 200% 200%;
    animation: gradientMove 8s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #fff;
    text-align: center;
    overflow: hidden;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #fff;
  }

  .game-container {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-gap: 12px;
    margin-top: 20px;
  }

  .card {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.4s, background 0.3s;
  }

  .card.flipped {
    background: #fff;
    color: #ff0080;
    transform: rotateY(180deg);
  }

  #message {
    margin-top: 20px;
    font-size: 1.2rem;
    font-weight: bold;
  }

  #quiz-section {
    display: none;
  }

  .quiz-container {
    background: rgba(255,255,255,0.15);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(255,255,255,0.3);
    width: 90%;
    max-width: 500px;
    margin-top: 20px;
    backdrop-filter: blur(6px);
  }

  .question { font-size: 1.2rem; margin-bottom: 20px; }

  .options button {
    display: block;
    width: 100%;
    background: #fff;
    color: #8e2de2;
    border: none;
    border-radius: 8px;
    margin: 8px 0;
    padding: 12px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
  }

  .options button:hover {
    background: #ff0080;
    color: #fff;
    transform: scale(1.05);
  }

  #result {
    margin-top: 20px;
    font-size: 1.2rem;
    font-weight: bold;
  }

  button#next {
    margin-top: 15px;
    background: #fff;
    color: #8e2de2;
    border: none;
    padding: 10px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  button#next:hover {
    background: #ff0080;
    color: #fff;
  }

  /* Always visible next-day button styling */
  #nextDayBtn {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-block;
    background: #fff;
    color: #8e2de2;
    border: none;
    padding: 10px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    opacity: 0.9;
    transition: all 0.3s ease;
  }

  #nextDayBtn:hover {
    background: #ff0080;
    color: #fff;
    transform: translateX(-50%) scale(1.05);
  }

  footer {
    position: absolute;
    bottom: 10px;
    font-size: 0.9rem;
    opacity: 0.8;
  }

  /* ADD THIS CSS inside your existing <style> section */
  .lock-message {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.2);
    padding: 12px 18px;
    border-radius: 12px;
    backdrop-filter: blur(5px);
    display: none;
    animation: fadeIn 0.5s ease;
    max-width: 320px;
    font-size: 0.95rem;
  }
</style>
</head>
<body>

<h1>💞 Memory Match to Unlock Quiz 💞</h1>

<div id="memory-game">
  <div class="game-container" id="game-board"></div>
  <div id="message"></div>
</div>

<!-- Hidden quiz section -->
<div id="quiz-section">
  <h1>Day 4: Fun Quiz About Us 🧡</h1>
  <div class="quiz-container">
    <div id="quiz">
      <div class="question" id="question">Loading question...</div>
      <div class="options" id="options"></div>
      <div id="result"></div>
      <button id="next" onclick="nextQuestion()">Next ➜</button>
    </div>
  </div>
</div>

<!-- Always visible Next Day Button -->
<button id="nextDayBtn" onclick="nextDay()">Go to Day 5 ➜</button>
<div class="lock-message" id="lockMessage"></div>

<footer>Made with ❤️ by Shahid 🧡</footer>

<script>
  // 💖 MEMORY GAME SETUP
  const emojis = ['💚', '😏', '💗', '🧡', '💣', '✨'];
  let cards = [...emojis, ...emojis];
  cards.sort(() => Math.random() - 0.5);
  const board = document.getElementById('game-board');
  let firstCard = null;
  let lockBoard = false;
  let matchedPairs = 0;

  cards.forEach(emoji => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.dataset.value = emoji;
    card.onclick = () => flipCard(card);
    board.appendChild(card);
  });

  function flipCard(card) {
    if (lockBoard || card.classList.contains('flipped')) return;
    card.classList.add('flipped');
    card.textContent = card.dataset.value;

    if (!firstCard) {
      firstCard = card;
    } else {
      lockBoard = true;
      if (card.dataset.value === firstCard.dataset.value) {
        matchedPairs++;
        firstCard = null;
        lockBoard = false;
        if (matchedPairs === emojis.length) {
          document.getElementById('message').innerHTML = 
            "🎉 Yay Mistri Jii! You matched all pairs! Quiz unlocked 🎮💞";
          setTimeout(() => {
            document.getElementById('memory-game').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
          }, 2000);
        }
      } else {
        setTimeout(() => {
          card.classList.remove('flipped');
          card.textContent = '';
          firstCard.classList.remove('flipped');
          firstCard.textContent = '';
          firstCard = null;
          lockBoard = false;
        }, 800);
      }
    }
  }

  // 🎮 QUIZ SECTION
  const quizData = [
    { question: "Who always forgets things first? 😅", options: ["Khizar💚", "Shahid🧡", "Both 😝", "None"], answer: "Shahid🧡"},
    { question: "What’s our favorite thing to do together?", options: ["Laugh endlessly 😂", "Talk about random stuff", "Eat Food Together", "Support Each Other ", "All of these 💛"], answer: "All of these 💛" },
    { question: "Who gives the best advice?", options: ["Khizar💚", "Shahid🧡", "Someone Else", "No one"], answer: "Khizar💚" },
    { question: "What’s Khizar’s secret superpower?", options: ["Making me smile 😊", "Eating fast 🍕", "Vanishing suddenly 🕵️", "Supporting me anytime when I need  ✨"], answer: "Supporting me anytime when I need  ✨"},
    { question: "If you could describe Shahid , it would be...?", options: ["Amazing", "Supportive", "Kind-hearted", "All of the above 💖"], answer: "All of the above 💖"},
    { question: "Do we need some changes in our friendship?", options: ["Yes", "No", "Maybe", "Forever Friends"], answer: "Forever Friends" },
    { question: "What we have is...", options: ["Just friendship 🧑‍🤝‍🧑", "Bhai Chara 💞", "Temporary", "Ordinary"], answer: "Bhai Chara 💞" },
    { question: "What’s the best thing about our friendship?", options: ["We understand each other", "We have fun together", "We support each other", "All of these 💛"], answer: "All of these 💛" },
    { question: "What’s our friendship level on a scale of 10 to 100?", options: ["50", "70", "90", " 💯"], answer: " 💯" },
    { question: "What do you value most in our friendship?", options: ["Trust", "Laughter", "Support", "All of the above 💖"], answer: "All of the above 💖" },
    { question: "What’s one thing you’d like to do together in the future?", options: ["Travel the world 🌍", "Always trust each other 💗", "Create memories 📸", "All of these 💛"], answer: "All of these 💛" },
    { question: "If I  die because of some reason, what you will do?", options: ["Cry", "Remember me forever 🧡", "Move on", "Celebrate because your problem is gone 🎉"], answer: "Remember me forever 🧡"},
    { question: "If I Died someday, can you be my children's Buddy Uncle?", options: ["I think about it", "Of Course ", "Maybe", "No"], answer: "Of Course "},
  ];


  let current = 0;
  let score = 0;
  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");
  const resultEl = document.getElementById("result");
  const nextBtn = document.getElementById("next");

  function loadQuestion() {
    resultEl.textContent = "";
    nextBtn.style.display = "none";
    const q = quizData[current];
    questionEl.textContent = q.question;
    optionsEl.innerHTML = "";
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(opt);
      optionsEl.appendChild(btn);
    });
  }

  function checkAnswer(selected) {
    const correct = quizData[current].answer;
    if (selected === correct) {
      resultEl.textContent = "✅ Correct!";
      score++;
    } else {
      resultEl.textContent = "❌ Oops! It was: " + correct;
    }
    Array.from(optionsEl.children).forEach(btn => btn.disabled = true);
    if (current < quizData.length - 1) {
      nextBtn.style.display = "inline-block";
    }
  }

  function nextQuestion() {
    current++;
    if (current < quizData.length) loadQuestion();
  }

  <!-- REPLACE YOUR CURRENT nextDay() FUNCTION WITH THIS -->

function nextDay() {

  // Unlock Date = 28 May 2026
  const unlockDate =
    new Date("2026-05-28T00:00:00");

  const now = new Date();

  const lockMessage =
    document.getElementById("lockMessage");

  if (now >= unlockDate) {

    // Open Day 5
    window.location.href = "day9.html";

  } else {

    // Remaining Time
    const diff = unlockDate - now;

    const days =
      Math.floor(diff / (1000 * 60 * 60 * 24));

    const hours =
      Math.floor((diff / (1000 * 60 * 60)) % 24);

    const minutes =
      Math.floor((diff / (1000 * 60)) % 60);

    lockMessage.style.display = "block";

    lockMessage.innerHTML = `
      🔒 Day 5 is locked ! Stay with us 😏 <br><br>
      Unlocks in <b>${days}d ${hours}h ${minutes}m</b>
    `;
  }
}

  loadQuestion();
</script>
</body>
</html>
