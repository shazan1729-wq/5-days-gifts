<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 1 | Compliment Generator 💬</title>

  <style>
    body {
      margin: 0;
      background:linear-gradient(135deg, #f0db1b 10%, #42ffe0 30%, #fe2273 70%, #08d3ea 100%);
      background-size: 200% 200%;
      animation: gradientMove 8s ease infinite;
      font-family: 'Poppins', monospace;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      margin-bottom: 1.5rem;
    }

    #compliment {
      font-size: 1.3rem;
      margin: 20px 0;
      min-height: 60px;
      width: 80%;
      max-width: 650px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    button {
      background: #fff;
      color: #8e2de2;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
      transition: 0.3s;
    }

    button:hover {
      background: #ff0080;
      color: #fff;
      transform: scale(1.1);
    }

    footer {
      position: absolute;
      bottom: 15px;
      opacity: 0.8;
      font-size: 0.9rem;
    }

    .lock-message {
      margin-top: 18px;
      background: rgba(255,255,255,0.2);
      padding: 12px 18px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
      display: none;
      animation: fadeIn 0.5s ease;
      max-width: 300px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body>

  <h1>Day 1: Compliment Generator ✨</h1>

  <p>Click the button below to get a random compliment, Khizar!</p>

  <div id="compliment">
    💬 Your compliments will appear here 💬
  </div>

  <button onclick="generateCompliment()">
    Get Compliment 💛
  </button>

  <button style="margin-top:20px;" onclick="nextDay()">
    Go to Day 2 ➜
  </button>

  <div class="lock-message" id="lockMessage"></div>

  <footer>
    Created with ❤️ by Shahid 🧸
  </footer>

  <script>

    const compliments = [

      "1. You are little bit annoying but you are special for Me ! ✨",

      "2. You’ve got the kind of smile that can fix my bad mood 😊",

      "3. Khizar, you’re seriously one of a kind 💫",

      "4. Your friendship is for me it's a pure gold 🧡",

      "5. You make everything more fun just by being there 🎉",

      "6. You know me better than the rest",

      "7. You have a heart that shines brighter than any one 💗",

      "8. You’re awesome — no updates required 💻",

      "9. Never forget — you’re genuinely special for me forever 🧡",

      "10. In the World full of selfishness, you are a true Gem 💎",

      "11. Your positivity is infectious and uplifting 🌟"

    ];

    function generateCompliment() {

      const randomIndex =
        Math.floor(Math.random() * compliments.length);

      const complimentBox =
        document.getElementById("compliment");

      complimentBox.style.opacity = 0;

      setTimeout(() => {

        complimentBox.innerHTML =
          compliments[randomIndex];

        complimentBox.style.opacity = 1;

      }, 300);
    }

    /* =========================
       DATE LOCK FOR DAY 2
    ========================= */

    function nextDay() {

      // Unlock Date = 24 May 2026
      const unlockDate =
        new Date("2026-05-25T00:00:00");

      const now = new Date();

      const lockMessage =
        document.getElementById("lockMessage");

      if (now >= unlockDate) {

        // Open Day 2
        window.location.href = "day2.html";

      } else {

        // Remaining Time
        const diff = unlockDate - now;

        const days =
          Math.floor(diff / (1000 * 60 * 60 * 24));

        const hours =
          Math.floor((diff / (1000 * 60 * 60)) % 24);

        const minutes =
          Math.floor((diff / (1000 * 60)) % 60);

        lockMessage.style.display = "block";

        lockMessage.innerHTML = `
          🔒 Day 2 is locked 💛 <br><br>
          Opens in <b>${days}d ${hours}h ${minutes}m</b>
        `;
      }
    }

  </script>

</body>
</html>
